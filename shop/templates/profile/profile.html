{% extends "shop/base.html" %}
{% load static %}

{% block content %}
  <section class="page-head">
    <h1>My Profile</h1>
    <p class="muted">View and update your account details.</p>
  </section>

  <section class="profile-wrap">
    <form id="profileForm" class="profile-card">
      <label>
        Username
        <input type="text" id="profileUsername" readonly />
      </label>
      <label>
        Email
        <input type="email" id="profileEmail" />
      </label>
      <label>
        Full name
        <input type="text" id="profileFullName" />
      </label>
      <label>
        Phone
        <input type="text" id="profilePhone" />
      </label>
      <label>
        Address line 1
        <input type="text" id="profileAddress1" />
      </label>
      <label>
        Address line 2
        <input type="text" id="profileAddress2" />
      </label>
      <div class="form-row-2">
        <label>
          City
          <input type="text" id="profileCity" />
        </label>
        <label>
          State
          <input type="text" id="profileState" />
        </label>
      </div>
      <label>
        Postal code
        <input type="text" id="profilePostal" />
      </label>
      <button class="btn primary" type="submit">Save profile</button>
    </form>
  </section>

  <script src="{% static 'shop/js/profile.js' %}"></script>
{% endblock %}

{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ page_title|default:"urstyle" }}</title>
    <link rel="stylesheet" href="{% static 'shop/css/styles.css' %}" />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="/">urstyle</a>
        <nav class="nav">
          <a href="/">Shop</a>
          <a href="/cart/">Cart</a>
          <a href="/orders/">Orders</a>
          <a class="muted" href="/auth/login/">Login</a>
        </nav>
      </div>
    </header>

    <main class="container">{% block content %}{% endblock %}</main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <div>
          <strong>Contact</strong>
          <div class="footer-line">Phone: +91 90000 00000</div>
          <div class="footer-line">Email: support@urstyle.com</div>
          <div class="footer-line">Address: India</div>
        </div>
        <div class="footer-right">
          <div class="footer-line">Shop fast • Track live • Pay demo</div>
        </div>
      </div>
    </footer>
  </body>
</html>

{% extends "shop/base.html" %}
{% load static %}

{% block content %}
  <section class="hero">
    <div class="container hero-inner">
      <div class="hero-left">
        <h1>Urstyle Shoe Store</h1>
        <p class="hero-sub">
          Shop trending footwear in <strong>INR</strong>. Add to cart, checkout, and track your order live.
        </p>
        <div class="hero-badges">
          <span class="badge">Fast Delivery</span>
          <span class="badge">UPI / Card / COD</span>
          <span class="badge">Live Tracking</span>
        </div>
      </div>
      <div class="hero-right">
        <div class="hero-panel">
          <div class="hero-panel-title">Today’s Picks</div>
          <div class="hero-panel-text muted">8 shoes • ₹ pricing • simple checkout</div>
        </div>
      </div>
    </div>
  </section>

  <section class="container">
    <section class="search-bar">
      <input id="searchInput" type="search" placeholder="Search shoes by name..." />
      <button id="searchBtn" type="button" class="btn primary">Search</button>
    </section>

    <section class="product-grid" id="productGrid"></section>
  </section>

  <script src="{% static 'shop/js/common.js' %}"></script>
  <script src="{% static 'shop/js/index.js' %}"></script>
{% endblock %}
